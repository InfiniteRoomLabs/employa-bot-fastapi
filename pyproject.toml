[dependency-groups]
dev = [
    "prek>=0.4.9,<1.0.0",
    "zizmor>=1.25.2",
]

[tool.uv.workspace]
members = ["backend"]

[tool.typos.files]
extend-exclude = [
    "uv.lock",
    "bun.lock",
    "backend/coverage/",
    "backend/htmlcov/",
    "frontend/dist/",
    "frontend/public/assets/images/",
]

[tool.typos.default]
extend-ignore-re = [
    # GitHub usernames in @mentions
    "@[a-zA-Z0-9](?:-?[a-zA-Z0-9])*",
]

[tool.typos.default.extend-identifiers]
alls = "alls"

[tool.typos.default.extend-words]
# Company name in seeded fixture data, not a typo of "Hash".
Hashi = "Hashi"
