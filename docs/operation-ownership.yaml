# Operation-ownership manifest -- Slice 0 deliverable (mvp-plan.md, "Operation-ownership
# manifest" bullet in Slice 0).
#
# Every operationId in mvp-api.yaml (89 total) appears exactly once below.
# getCoachGreeting was removed from the contract entirely (founder-ruled
# 2026-07-04, DECISIONS-NEEDED.md #5: canned client copy, not a backend op) --
# it has no manifest entry.
#
# Fields per entry:
#   slice:    owning slice number 1-6 per docs/mvp-plan.md "Build order"
#   status:   planned | implemented | deferred (deferred ONLY for the 6 ids on the
#             CONTRACT-NOTES.md DEFERRED list, post-ruling)
#   ai:       true only for ops that invoke a model (frozen: runDeepMatchScore,
#             deriveAccomplishmentFromProject; deferred-AI: proposeCoachEdit --
#             see CONTRACT-NOTES.md AI-OPS table)
#   consumer: frontend hook/screen from ../employa-bot-front-end/docs/wiring-guide.md,
#             or "none (net-new)" for the one operation with no mockup consumer today
#   tests:    required test tags. Baseline: every op = contract-fidelity. Id-addressed
#             ops (cross-user access must 404) = + ownership-404. transitionApplication
#             = + transition-matrix. AI ops = + ai-envelope, provider-unavailable.
#             Error-specific envelopes (undo window, snapshot conflict, deep-score
#             cap/queue) get their own tag. Deferred entries carry tests: [] -- no
#             tests are required while an operation is not implementable; the tag set
#             above applies once the founder rules and the op moves off deferred.
#   reason:   deferred entries only -- founder-ruling reference into DECISIONS-NEEDED.md
#
# CI check: backend/tests/test_operation_manifest.py validates completeness
# (every mvp-api.yaml operationId present exactly once, no orphans) and schema shape.

