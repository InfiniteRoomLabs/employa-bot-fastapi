openapi: 3.1.0
info:
  title: Employa-Bot API
  version: 1.0.0-slice0
  description: |
    FROZEN CONTRACT (Slice 0, 2026-07-04). Derived from the mockup review
    artifact, now normalized into an implementation-ready contract. Deferred
    operations (pending founder ruling) are enumerated in DECISIONS-NEEDED.md
    and marked in docs/operation-ownership.yaml; they are NOT frozen as
    implementable.

    Conventions:
    - Lifecycle actions are plain path segments (`POST /resource/{id}/verb`,
      e.g. `/applications/{id}/mark-won`) -- no Google-AIP `:verb` custom
      methods. Sub-collections nest under their parent resource
      (`/jobs/inbox`, `/agents/log`, `/resumes/uploads`).
    - Resource ids are UUIDs (RFC 4122) EVERYWHERE. Static segments like
      `/resumes/uploads` are unambiguous next to `/resumes/{id}` because a
      UUID can never equal a static segment. The real backend resolves by
      UUID ONLY -- the mock's legacy slug/name leniency is dropped from the
      contract (the frontend keeps its own APP_UUID_BY_SLUG map client-side).
    - Timestamps: ISO-8601 `format: date-time`, UTC, everywhere. No relative
      strings ("just now", "2d ago"). Ages and durations are derived
      client-side from timestamps (e.g. `Application.createdAt`).
    - Money: plain JSON number in USD, field name suffixed `Usd`
      (`costUsd`, `spendMoUsd`), up to 6 decimal places (LLM costs are
      sub-cent). No currency objects, no formatted strings. Structured
      compensation (`Salary`, integer dollars) stays structured -- it is
      compensation data, not a cost.
    - Tokens/counts: integers.
    - Presentation removed: `icon` names, button/toggle copy, and preformatted
      money/token strings. Semantic distinctions the UI branches on are
      expressed as enums. The client owns copy, icons, and formatting.
    - Errors use the shared `Error` envelope. `kind` -> HTTP status:
      `not_found`->404, `unauthorized`->401, `validation_error`->422,
      `conflict`->409, `cap_reached`->402, `undo_window_expired`->409,
      `invalid_transition`->422, `rate_limited`->429,
      `provider_unavailable`->503. Every operation carries a `default` Error
      response; semantically notable statuses are also listed explicitly.
      Transport failures (network/DNS/timeout) are mapped by the frontend
      translator itself and are NOT part of the wire `kind` vocabulary.
    - AI operations execute SYNCHRONOUSLY: they block and return their result
      with an `AiRunEnvelope` (`aiRun`) embedded. No polling endpoints, no
      `/ai-runs/{id}`, no product-visible queued states in MVP. Run records
      still persist server-side as telemetry.
    - Not modeled (mock-only, excluded from the contract): `getUserMenu`,
      `getExtensionState`, `getBudgetSnapshot`, `__resetForTests`, failure
      injection.

servers:
  - url: /api/v1

tags:
  - name: user
  - name: applications
  - name: archive
  - name: interviews
  - name: shortlist
  - name: jobs
  - name: match
  - name: agents
  - name: resumes
  - name: resume-lifecycle
  - name: coach
  - name: library
  - name: searches
  - name: notifications
  - name: settings
  - name: account

paths:
  # ---------------------------------------------------------------- user
  /user:
    get:
      tags: [user]
      operationId: getCurrentUser
      summary: Current user / persona
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  # -------------------------------------------------------- applications
  /applications:
    get:
      tags: [applications]
      operationId: getApplications
      summary: Applications scoped to a saved search
      description: When `searchId` is omitted, the canonical/default list ships.
      parameters:
        - name: searchId
          in: query
          schema: { type: string, format: uuid }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ApplicationView' }
    post:
      tags: [applications]
      operationId: createApplication
      summary: Create an application (ORI-014)
      description: |
        Normalized create (ADR-006): mints a Job for the posting plus an
        ids-only Application, returns the joined view. D15: when `searchId`
        is omitted the capture lands in the last-used / auto-created
        "My jobs" search.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateApplicationInput' }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApplicationView' }

  /applications/{id}:
    get:
      tags: [applications]
      operationId: getApplication
      summary: One application (joined view)
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApplicationView' }
        '404': { $ref: '#/components/responses/NotFound' }

  /applications/{id}/transitions:
    post:
      tags: [applications]
      operationId: transitionApplication
      summary: Apply a stage transition (append-only)
      description: |
        The general stage-transition operation (the core loop). Legal moves are
        exactly those in the settled application-stage machine
        (state-machines.md#application-stages); an illegal target -> 422
        `invalid_transition`. Optimistic concurrency: `expectedVersion` must
        equal the current `Application.version` or the call fails 409 `conflict`.

        Side effect: a transition to `applied` materializes the immutable
        resume snapshot (D10) from `resumeId` (required for that target) and
        locks it; the snapshot is thereafter served by GET
        /applications/{id}/snapshot. Every transition appends an immutable
        StageTransition row; corrections are compensating transitions
        (`source=user_correction`), never updates/deletes.
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransitionInput' }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: Transition applied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransitionResult' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/InvalidTransition' }

  /applications/{id}/snapshot:
    get:
      tags: [applications]
      operationId: getResumeSnapshot
      summary: Immutable submitted-resume snapshot (D10)
      description: Materialized at the APPLIED transition; never changes afterward.
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResumeSnapshot' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: No submitted copy exists until the application reaches APPLIED (`conflict`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /applications/{id}/mark-won:
    post:
      tags: [applications]
      operationId: markWon
      summary: Mark an application WON (D18)
      description: |
        Records the outcome, archives the active application, returns a
        time-boxed undo token (300 s). After the window, correcting a win is
        a deliberate OFFER_RESCINDED (see state-machines.md).
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MarkWonInput' }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarkWonResult' }
        '404': { $ref: '#/components/responses/NotFound' }

  /applications/{id}/undo-mark-won:
    post:
      tags: [applications]
      operationId: undoMarkWon
      summary: Reverse a mark-won within the grace window (D18)
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [undoToken]
              properties:
                undoToken: { type: string, format: uuid }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApplicationView' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Undo window expired (`undo_window_expired`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /applications/{id}/reactivate:
    post:
      tags: [applications]
      operationId: reactivateApplication
      summary: Reactivate a closed/archived application (D19)
      description: Clears the terminal outcome and re-enters the pipeline at APPLIED.
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApplicationView' }
        '404': { $ref: '#/components/responses/NotFound' }

  /applications/{id}/dismiss:
    post:
      tags: [applications]
      operationId: dismissApplication
      summary: Dismiss an application (D12)
      description: |
        Pre-commit (SAVED/DRAFT) the application is removed outright.
        Post-APPLIED it maps to WITHDREW with reason chips and archives --
        a committed application is never silently deleted.
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reasons:
                  type: array
                  items: { type: string }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DismissResult' }
        '404': { $ref: '#/components/responses/NotFound' }

  /applications/{id}/timeline:
    get:
      tags: [applications]
      operationId: getApplicationTimeline
      summary: Append-only audit timeline (TRK-118)
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TimelineEvent' }
        '404': { $ref: '#/components/responses/NotFound' }

  /applications/{id}/interviews:
    get:
      tags: [interviews]
      operationId: getInterviewRounds
      summary: Interview rounds for an application (TRK-117)
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InterviewRound' }

  /applications/{appId}/interviews/{roundId}:
    patch:
      tags: [interviews]
      operationId: patchInterviewRound
      summary: Update an interview round (D3 / TRK-127)
      description: Only date/type/format/status are mutable; other keys are dropped.
      parameters:
        - { name: appId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: roundId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date: { type: string, format: date-time }
                type: { $ref: '#/components/schemas/InterviewType' }
                format: { $ref: '#/components/schemas/InterviewFormat' }
                status: { $ref: '#/components/schemas/InterviewStatus' }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InterviewRound' }
        '404': { $ref: '#/components/responses/NotFound' }

  # -------------------------------------------------------------- archive
  /archive:
    get:
      tags: [archive]
      operationId: getArchive
      summary: Archived applications by outcome bucket (ORI-009)
      parameters:
        - name: kind
          in: query
          required: true
          schema:
            type: string
            enum: [won, passed]
          description: won -> outcome=won; passed -> outcome in (rejected, withdrawn).
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ApplicationView' }

  /archive/counts:
    get:
      tags: [archive]
      operationId: getArchiveCounts
      summary: Live archive badge counts
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [won, passed]
                properties:
                  won: { type: integer }
                  passed: { type: integer }

  # ------------------------------------------------------------ shortlist
  /shortlist:
    get:
      tags: [shortlist]
      operationId: getShortlist
      summary: Shortlist entries (optionally per-search)
      parameters:
        - name: searchId
          in: query
          schema: { type: string, format: uuid }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ShortlistEntry' }
    post:
      tags: [shortlist]
      operationId: addToShortlist
      summary: Add a job to the shortlist (ORI-014)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company, role, location, salary, match]
              properties:
                jobId: { type: string, format: uuid }
                company: { type: string }
                role: { type: string }
                location: { type: string }
                salary:
                  oneOf:
                    - { $ref: '#/components/schemas/Salary' }
                    - { type: 'null' }
                match: { type: integer }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShortlistEntry' }

  /shortlist/{id}:
    delete:
      tags: [shortlist]
      operationId: dismissFromShortlist
      summary: Remove a shortlist entry by UUID
      description: >
        UUID-ified: keyed by the shortlist entry id (the mock's role-string key
        is dropped from the contract).
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '204': { description: Removed. }
        '404': { $ref: '#/components/responses/NotFound' }

  # ----------------------------------------------------------------- jobs
  /jobs:
    get:
      tags: [jobs]
      operationId: getJobs
      summary: All captured postings (ADR-006 canonical collection)
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Job' }

  /jobs/inbox:
    get:
      tags: [ jobs ]
      operationId: getJobsInbox
      summary: Jobs inbox (optionally per-search)
      parameters:
        - name: searchId
          in: query
          schema: { type: string, format: uuid }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/JobInboxItem' }

  /jobs/{id}:
    get:
      tags: [jobs]
      operationId: getJob
      summary: One captured posting
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '404': { $ref: '#/components/responses/NotFound' }

  /jobs/{id}/preview-deep-score:
    post:
      tags: [match]
      operationId: previewDeepMatchScore
      summary: Cost preview for a deep (paid) match score (D8b / D21)
      description: |
        NON-AI: pure cost arithmetic (no model invocation). One itemized line
        per resume; free rough heuristic scores never appear here.
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resumeIds]
              properties:
                resumeIds:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CostPreview' }

  /jobs/{id}/deep-score:
    post:
      tags: [match]
      operationId: runDeepMatchScore
      summary: Run a deep (paid) match score (D8 / D9a)
      description: |
        AI operation (synchronous). Completes on the chosen provider and
        returns the result with `aiRun` embedded. If the monthly cap is
        reached it fails with `cap_reached` so the UI can re-consent -- never a
        silent model downgrade. Bounded-concurrency queue overflow -> 429
        `rate_limited`; provider unavailable/failed -> 503 `provider_unavailable`.
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resumeId]
              properties:
                resumeId: { type: string, format: uuid }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeepMatchResult' }
        '402':
          description: Monthly LLM cap reached (`cap_reached`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/ProviderUnavailable' }

  /match-report:
    get:
      tags: [match]
      operationId: getMatchReport
      summary: Match report for a (resume, job) pair
      parameters:
        - { name: resumeId, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: jobId, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchReport' }

  # --------------------------------------------------------------- agents
  /agents:
    get:
      tags: [agents]
      operationId: getAgents
      summary: All agents
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Agent' }

  /agents/{id}:
    get:
      tags: [agents]
      operationId: getAgent
      summary: One agent
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [agents]
      operationId: patchAgent
      summary: Patch mutable agent fields (ORI-014 pause / run-now)
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state: { $ref: '#/components/schemas/AgentState' }
                live: { type: boolean }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/{id}/permissions:
    get:
      tags: [agents]
      operationId: getAgentPermissions
      summary: Per-agent permission grants (AGT-023)
      description: Each grant is enriched with its `requiredTier` (D25 / AGT-031).
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AgentPermission' }

  /agents/{id}/trust-tier:
    get:
      tags: [agents]
      operationId: getAgentTrustTier
      summary: Agent trust standing + ladder (D25 / AGT-031)
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentTrustTierView' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [agents]
      operationId: patchAgentTrustTier
      summary: Set an agent's trust tier (soft-gated)
      description: |
        Founder ruled 2026-07-04: DEFERRED (DECISIONS-NEEDED #2). Granted-vs-pending
        semantics depend on the unresolved proposal-approval machine; not
        implementable in MVP.
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetTier]
              properties:
                targetTier: { $ref: '#/components/schemas/AgentTrustTier' }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentTrustTierUpdate' }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/log:
    get:
      tags: [agents]
      operationId: getAgentLog
      summary: Agent activity log
      parameters:
        - { name: agentId, in: query, schema: { type: string, format: uuid } }
        - name: kind
          in: query
          schema: { $ref: '#/components/schemas/AgentLogKind' }
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AgentLogEntry' }

  /agents/review-queue:
    get:
      tags: [agents]
      operationId: getReviewQueue
      summary: Agent actions awaiting human approval (AGT-021)
      description: 'Founder ruled 2026-07-04: DEFERRED (DECISIONS-NEEDED #1). Proposal-approval machine unresolved.'
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReviewQueueItem' }

  /agents/review-queue/{id}/approve:
    post:
      tags: [agents]
      operationId: approveAgentAction
      summary: Approve a queued agent action
      description: 'Founder ruled 2026-07-04: DEFERRED (DECISIONS-NEEDED #1). Proposal-approval machine unresolved.'
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '204': { description: Approved. }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/review-queue/{id}/reject:
    post:
      tags: [agents]
      operationId: rejectAgentAction
      summary: Reject a queued agent action
      description: 'Founder ruled 2026-07-04: DEFERRED (DECISIONS-NEEDED #1). Proposal-approval machine unresolved.'
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '204': { description: Rejected. }
        '404': { $ref: '#/components/responses/NotFound' }

  # -------------------------------------------------------------- resumes
  /resumes:
    get:
      tags: [resumes]
      operationId: getResumes
      summary: All resumes
      responses:
        default: { $ref: '#/components/responses/DefaultError' }
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Resume' }
    post:
      tags: [resumes]
      operationId: createResume
